<!DOCTYPE html><html><body>
<iframe id="f" src="/index.html" width="1000" height="700"></iframe>
<script>
const errs = [];
const iframe = document.getElementById('f');
iframe.addEventListener('load', () => {
  const fw = iframe.contentWindow;
  fw.addEventListener('error', e => errs.push('ERR@'+e.lineno+':'+e.message));
  fw.addEventListener('unhandledrejection', e => errs.push('REJ:'+e.reason));
  // Also hook console.error
  const oe = fw.console.error;
  fw.console.error = (...a) => { errs.push('CE:'+a.join(' ')); oe.apply(fw.console,a); };
  setTimeout(() => {
    try { fw.document.getElementById('playBtn').click(); } catch(e) { errs.push('CLICK:'+e.message); }
    setTimeout(() => { document.title = errs.length ? errs.join(' || ').slice(0,500) : 'CLEAN'; }, 2000);
  }, 500);
});
</script>
</body></html>
